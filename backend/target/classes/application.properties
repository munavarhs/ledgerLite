spring.application.name=demo
spring.devtools.restart.enabled=true
# 256-bit secret for HS256 signing. In real production this comes from
# an environment variable or secrets manager, NEVER committed to git.
app.jwt.secret=ThisIsADevelopmentSecretKeyMakeItLongEnoughForHS256Algorithm
app.jwt.expiration-ms=3600000

# Redis connection — matches the Docker port mapping from 4.1
spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:paymentsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create tables from your entities on startup
spring.jpa.hibernate.ddl-auto=update
# Log the SQL Hibernate generates — great for learning
spring.jpa.show-sql=true

# Enable the H2 web console to browse the DB in a browser
spring.h2.console.enabled=true
